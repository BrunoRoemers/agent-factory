schemaVersion: "1"
kind: agent
name: pi
displayName: Pi Agent
description: Pi coding agent configured to use local inference

agent:
  image: "agent-factory/pi:latest"
  aiFilename: AGENTS.md
  persistence: persistent
  entrypoint:
    run: [bash]

network:
  allowedDomains:
    # Claude
    - api.anthropic.com
    - claude.ai
    - platform.claude.com

    # Local Inference
    - host.docker.internal:4321

  serviceDomains:
    host.docker.internal:4321: local-inference

  serviceAuth:
    local-inference:
      headerName: x-api-key
      valueFormat: "%s"

credentials:
  sources:
    local-inference:
      env:
        - LOCAL_INFERENCE_API_KEY

environment:
  proxyManaged:
    - LOCAL_INFERENCE_API_KEY
