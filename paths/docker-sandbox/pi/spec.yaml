schemaVersion: "1"
kind: mixin
name: pi
displayName: Pi Agent
description: Installs the Pi coding agent CLI and configures it to use local inference

network:
  allowedDomains:
    # NPM
    - registry.npmjs.org
    - api.github.com

    # GitHub
    - github.com
    - release-assets.githubusercontent.com

    # Claude
    - api.anthropic.com
    - claude.ai
    - platform.claude.com

    # Local Models
    - host.docker.internal:4321

commands:
  install:
    - command: "npm install -g @earendil-works/pi-coding-agent"
      user: "1000"
      description: Install Pi
